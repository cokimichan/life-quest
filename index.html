<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE QUEST</title>

<style>
body{
    margin:0;
    background:#e8f5e9;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    text-align:center;
    color:#2e7d32;
}

.container{
    padding:40px 20px;
}

.plant{
    font-size:80px;
    margin:30px 0;
}

button{
    background:#4caf50;
    color:white;
    border:none;
    border-radius:16px;
    padding:15px 25px;
    font-size:20px;
}

#xp{
    font-size:28px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 LIFE QUEST</h1>

<p>人生は、育てられる。</p>

<div class="plant" id="plant">
🌱
</div>

<button onclick="gainXP()">
+10 XP
</button>

<div id="xp">
XP：0
</div>

</div>

<script>

let xp=0;

function gainXP(){

xp+=10;

document.getElementById("xp").innerHTML="XP："+xp;

if(xp>=100){
document.getElementById("plant").innerHTML="🌳";
}
else if(xp>=50){
document.getElementById("plant").innerHTML="🪴";
}

}

</script>

</body>
</html>

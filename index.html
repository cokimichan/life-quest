<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE QUEST</title>

<style>
body{
    margin:0;
    background:#e8f5e9;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    text-align:center;
    color:#2e7d32;
}

.container{
    padding:40px 20px;
}

.plant{
    font-size:80px;
    margin:30px 0;
}

button{
    display:block;
    width:100%;
    max-width:320px;
    margin:12px auto;
    background:#4caf50;
    color:white;
    border:none;
    border-radius:16px;
    padding:15px;
    font-size:20px;
    cursor:pointer;
}

#xp{
    font-size:28px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 LIFE QUEST</h1>

<p>人生は、育てられる。</p>

<div class="plant" id="plant">
🌱
</div>

<h2>📋 今日のクエスト</h2>

<div class="quest-list">

<button onclick="completeQuest(this)">
🚿 お風呂
</button>

<button onclick="completeQuest(this)">
🪥 歯磨き
</button>

<button onclick="completeQuest(this)">
💄 メイク落とす
</button>

<button onclick="completeQuest(this)">
🧘 ピラティス
</button>

<button onclick="completeQuest(this)">
📚 読書
</button>

<button onclick="completeQuest(this)"> 
🧹 片付け 
</button>

<button onclick="completeQuest(this)"> 
🍳 料理 
</button>

<button onclick="completeQuest(this)"> 
✏️ 勉強 
</button>

</div>

<div id="xp">
XP：0
</div>

</div>

<script>

let xp=0;
const xpDisplay = document.getElementById("xp");
const plant = document.getElementById("plant");

button.disabled=true;

button.innerHTML="✅ お風呂";

button.style.background="#9ccc65";

xp+=10;

document.getElementById("xp").innerHTML="XP："+xp;

if(xp>=100){
document.getElementById("plant").innerHTML="🌳";
}
else if(xp>=50){
document.getElementById("plant").innerHTML="🪴";
}

}

function completeQuest(button){

    if(button.classList.contains("completed")){
        return;
    }

    button.classList.add("completed");

    button.innerHTML = "✅ " + button.innerHTML;

    xp += 10;

    xpDisplay.innerHTML = "XP : " + xp;

    if(xp >= 100){
        plant.innerHTML = "🌳";
    }else if(xp >= 50){
        plant.innerHTML = "🪴";
    }

}

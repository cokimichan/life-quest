<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIFE QUEST</title>

<style>

body{
    margin:0;
    background:#e8f5e9;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    text-align:center;
    color:#2e7d32;
}

.container{
    padding:40px 20px;
}

h1{
    margin-bottom:10px;
}

.plant{
    font-size:80px;
    margin:25px 0;
    transition:0.3s;
}

.quest-list{
    margin-top:25px;
}

button{

    display:block;
    width:100%;
    max-width:320px;

    margin:12px auto;

    padding:15px;

    border:none;
    border-radius:16px;

    background:#4caf50;
    color:white;

    font-size:20px;

    cursor:pointer;

    transition:0.2s;
}

button:hover{

    transform:scale(1.02);

}

.completed{

    background:#A5D6A7;
    color:#1B5E20;

}

#xp{

    font-size:28px;

    margin-top:25px;

    font-weight:bold;

}

</style>

</head>
    
<body>

<div class="container">

<h1>🌱 LIFE QUEST</h1>

<p>人生は、育てられる。</p>

<div class="plant" id="plant">
🌱
</div>

<h2>📋 今日のクエスト</h2>

<div class="quest-list">

<button onclick="completeQuest(this)">
🚿 お風呂
</button>

<button onclick="completeQuest(this)">
🪥 歯磨き
</button>

<button onclick="completeQuest(this)">
💄 メイク落とす
</button>

<button onclick="completeQuest(this)">
🧘 ピラティス
</button>

<button onclick="completeQuest(this)">
📚 読書
</button>

<button onclick="completeQuest(this)">
🧹 片付け
</button>

<button onclick="completeQuest(this)">
🍳 料理
</button>

<button onclick="completeQuest(this)">
✏️ 勉強
</button>

</div>

<div id="xp">
XP：0
</div>

</div>

<script>

// =====================
// 要素を取得
// =====================

const xpDisplay = document.getElementById("xp");
const plant = document.getElementById("plant");


// =====================
// データ読込
// =====================

let xp = Number(localStorage.getItem("xp")) || 0;

// 今日の日付を取得
const today = new Date().toLocaleDateString("sv-SE");

// 前回アプリを開いた日
const savedDate = localStorage.getItem("today");

    if(savedDate !== today){

    localStorage.clear();

    localStorage.setItem("today", today);

}

// 初めて開く、または日付が変わっていたら保存
if(savedDate !== today){

    localStorage.setItem("today", today);

}

// =====================
// 初期表示
// =====================

updateUI();


// =====================
// クエスト完了
// =====================

function completeQuest(button){

    if(button.classList.contains("completed")){
        return;
    }

    button.classList.add("completed");

    button.disabled = true;

    button.innerHTML = "✅ " + button.innerHTML;

    // チェック状態を保存
localStorage.setItem(button.innerText, "done");
    
    xp += 10;

    localStorage.setItem("xp", xp);

    updateUI();

}


// =====================
// 画面更新
// =====================

function updateUI(){

    xpDisplay.innerHTML = "XP：" + xp;

    if(xp >= 100){

        plant.innerHTML = "🌳";

    }else if(xp >= 50){

        plant.innerHTML = "🪴";

    }else{

        plant.innerHTML = "🌱";

    }

}

</script>

</body>
</html>
